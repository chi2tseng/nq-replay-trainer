<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NQ Replay Trainer</title>
<link rel="stylesheet" href="src/styles.css?v=8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400..600,0..1,0&display=block">
<script src="lib/lightweight-charts.standalone.production.js"></script>
</head>
<body>
<div id="app">

  <!-- ===== Top toolbar ===== -->
  <header id="toolbar">
    <div class="grp">
      <span id="symbol">NQ</span>
      <select id="dataSelect" title="資料集"></select>
      <select id="tfSelect" title="時間週期"></select>
      <select id="sessionSelect" title="跳到某個交易日"></select>
    </div>

    <div class="grp center">
      <button id="btnPrevDay" title="上一個交易日 09:30 ET（[ 或 ←）"><span class="material-symbols-outlined">keyboard_double_arrow_left</span></button>
      <button id="btnToStart" title="回到此 session 開頭"><span class="material-symbols-outlined">skip_previous</span></button>
      <button id="btnNextDay" title="下一個交易日 09:30 ET（] 或 →）"><span class="material-symbols-outlined">keyboard_double_arrow_right</span></button>
      <button id="btnStepBack" title="退一根 (僅空手時)"><span class="material-symbols-outlined">chevron_left</span></button>
      <button id="btnPlay" class="play material-symbols-outlined" title="播放 / 暫停 (P)">play_arrow</button>
      <button id="btnStepFwd" title="前進一根 (空白鍵)"><span class="material-symbols-outlined">skip_next</span></button>
      <select id="speedSelect" title="播放速度">
        <option value="1">1 bar/s</option>
        <option value="2" selected>2 bar/s</option>
        <option value="4">4 bar/s</option>
        <option value="8">8 bar/s</option>
        <option value="20">20 bar/s</option>
      </select>
      <input id="startSlider" type="range" min="0" max="100" value="0" title="拖曳設定起點 (僅空手時)" />
      <button id="btnPickStart" title="點圖設 replay 起點 (空手時)"><span class="material-symbols-outlined">my_location</span></button>
    </div>

    <div class="grp right">
      <span id="clock" class="mono">--:--</span>
      <span id="clockPrice" class="mono">--</span>
    </div>
  </header>

  <!-- ===== Main: chart + side panel ===== -->
  <main id="main">
    <section id="chartwrap"><div id="chart"></div><div id="chartLegend"></div><div id="oscPane"><div id="oscBar"><span class="osc-tag">OSC</span><select id="oscSelect" title="震盪指標子視窗"><option value="rsi">RSI 14</option><option value="macd">MACD 12·26·9</option><option value="off">關閉 Off</option></select></div></div></section>
    <div id="gutterCol" class="gutter col" title="拖曳調整側欄寬度 (雙擊重設)"></div>

    <aside id="side">
      <!-- order entry -->
      <div class="card">
        <div class="card-h">下單 Order</div>
        <div class="row">
          <label>進場別</label>
          <select id="entryType">
            <option value="market">市價 Market</option>
            <option value="limit">限價 Limit</option>
            <option value="stop">停損 Stop</option>
          </select>
        </div>
        <div class="row" id="entryPriceRow" style="display:none">
          <label>進場價</label>
          <input id="entryPrice" type="number" step="0.25" />
        </div>
        <div class="row"><label>ATM 範本</label><select id="atmSelect"></select></div>
        <div class="row"><label title="套用幾組 ATM,每組 = 範本各目標口數總和">口數 ×</label><input id="qty" type="number" min="1" step="1" value="1" /></div>
        <div class="btn-row">
          <button id="btnBuy" class="ico-btn buy"><span class="material-symbols-outlined">add_circle</span>BUY · Long</button>
          <button id="btnSell" class="ico-btn sell"><span class="material-symbols-outlined">remove_circle</span>SELL · Short</button>
        </div>
        <div class="btn-row">
          <button id="btnFlatten" class="ico-btn flat"><span class="material-symbols-outlined">close</span>FLATTEN</button>
          <button id="btnReverse" class="ico-btn rev"><span class="material-symbols-outlined">swap_horiz</span>REVERSE</button>
        </div>
        <div class="btn-row"><button id="btnCancelEntry" class="ico-btn flat"><span class="material-symbols-outlined">cancel</span>取消掛單</button></div>
      </div>

      <!-- position -->
      <div class="card">
        <div class="card-h">部位 Position</div>
        <div id="posBox" class="posflat">空手 Flat</div>
        <div id="ordersBox"></div>
      </div>

      <!-- indicators & annotation tools -->
      <div class="card">
        <div class="card-h">指標 / 標註</div>
        <div class="row chk"><label><input id="ripsterToggle" type="checkbox" /> Ripster EMA 雲</label></div>
        <div class="row sub" style="font-size:11px;padding-left:22px">8/9 · 5/12 · 34/50 · 72/89 · 180/200</div>
        <div class="row chk"><label><input type="checkbox" id="indVwap"><span class="ind-swatch" style="background:#e040fb"></span>VWAP（每日盤中錨定）</label></div>
        <div class="row chk"><label><input type="checkbox" id="indBB"><span class="ind-swatch" style="background:#f0b90b"></span>布林通道 20/2σ</label></div>
        <div class="row chk"><label><input type="checkbox" id="indEma"><span class="ind-swatch" style="background:#42a5f5"></span>EMA 緞帶</label></div>
        <div class="row sub"><label>EMA 週期</label><span><input type="text" id="emaPeriods" placeholder="9,21,50,200" style="width:110px" /></span></div>
        <div class="card-h" style="margin-top:10px">標註工具(選一個再點圖)</div>
        <div class="btn-row">
          <button id="annUp" class="ico-btn" title="放上向上箭頭"><span class="material-symbols-outlined">arrow_upward</span>箭頭</button>
          <button id="annDown" class="ico-btn" title="放上向下箭頭"><span class="material-symbols-outlined">arrow_downward</span>箭頭</button>
        </div>
        <div class="btn-row">
          <button id="annLong" class="ico-btn buy" title="標記做多"><span class="material-symbols-outlined">trending_up</span>做多</button>
          <button id="annShort" class="ico-btn sell" title="標記做空"><span class="material-symbols-outlined">trending_down</span>做空</button>
        </div>
        <div class="btn-row"><button id="annClear" class="ico-btn flat" title="清除所有標註"><span class="material-symbols-outlined">delete</span>清除標註</button></div>
        <div class="card-h" style="margin-top:10px">繪圖工具(選一個再點圖)</div>
        <div class="btn-row">
          <button id="drwHL" class="ico-btn" title="水平線:點一下放在該價位"><span class="material-symbols-outlined">horizontal_rule</span>水平線</button>
          <button id="drwTL" class="ico-btn" title="趨勢線:點兩個端點"><span class="material-symbols-outlined">show_chart</span>趨勢線</button>
        </div>
        <div class="btn-row">
          <button id="drwRay" class="ico-btn" title="射線:點兩點,往右延伸"><span class="material-symbols-outlined">north_east</span>射線</button>
          <button id="drwBox" class="ico-btn" title="矩形框:點兩個對角"><span class="material-symbols-outlined">crop_square</span>矩形</button>
        </div>
        <div class="btn-row">
          <button id="drwFib" class="ico-btn" title="斐波那契回撤:點兩個端點(高→低 或 低→高)"><span class="material-symbols-outlined">format_line_spacing</span>Fib</button>
          <button id="drwMeasure" class="ico-btn" title="測量:點兩點看 Δ價/Δticks/Δ%/根數"><span class="material-symbols-outlined">straighten</span>測量</button>
        </div>
        <div class="btn-row"><button id="drwClear" class="ico-btn flat" title="清除所有繪圖"><span class="material-symbols-outlined">ink_eraser</span>清除繪圖</button></div>
      </div>

      <!-- ATM editor -->
      <details class="card" id="atmEditor">
        <summary class="card-h">ATM 範本編輯 (多目標分批)</summary>
        <div class="row"><label>名稱</label><input id="atmName" type="text" placeholder="My ATM" /></div>
        <div class="row"><label>停損 SL (ticks)</label><input id="atmSL" type="number" min="0" value="10" /></div>
        <div class="row sub2 head"><span>目標</span><span>ticks</span><span>口數</span></div>
        <div class="row sub2"><span>T1</span><input id="atmT1t" type="number" min="0" value="20" /><input id="atmT1q" type="number" min="0" value="1" /></div>
        <div class="row sub2"><span>T2</span><input id="atmT2t" type="number" min="0" value="0" /><input id="atmT2q" type="number" min="0" value="0" /></div>
        <div class="row sub2"><span>T3</span><input id="atmT3t" type="number" min="0" value="0" /><input id="atmT3q" type="number" min="0" value="0" /></div>
        <div class="row chk"><label><input id="atmBEon" type="checkbox" /> 自動保本 Breakeven</label></div>
        <div class="row sub"><label>觸發 / 偏移 (ticks)</label><span><input id="atmBEtrig" type="number" value="12" /> / <input id="atmBEoff" type="number" value="1" /></span></div>
        <div class="row chk"><label><input id="atmTrailon" type="checkbox" /> 移動停損 Trailing</label></div>
        <div class="row sub"><label>啟動 / 距離 (ticks)</label><span><input id="atmTrailTrig" type="number" value="16" /> / <input id="atmTrailDist" type="number" value="8" /></span></div>
        <div class="btn-row">
          <button id="btnAtmSave" class="ico-btn save"><span class="material-symbols-outlined">save</span>儲存範本</button>
          <button id="btnAtmDel" class="ico-btn del"><span class="material-symbols-outlined">delete</span>刪除</button>
        </div>
      </details>
    </aside>
  </main>

  <div id="gutterRow" class="gutter row" title="拖曳調整下方面板高度 (雙擊重設)"></div>

  <!-- ===== Bottom: trades + dashboard ===== -->
  <footer id="bottom">
    <div id="tabs">
      <button id="tabTrades" class="tab active ico-btn"><span class="material-symbols-outlined">receipt_long</span>交易紀錄</button>
      <button id="tabDash" class="tab ico-btn"><span class="material-symbols-outlined">dashboard</span>Dashboard</button>
      <span class="spacer"></span>
      <button id="btnExportCsv" class="mini ico-btn"><span class="material-symbols-outlined">download</span>匯出 CSV</button>
      <button id="btnReset" class="mini danger ico-btn"><span class="material-symbols-outlined">delete_sweep</span>清空</button>
    </div>

    <div id="panelTrades" class="panel">
      <div id="tradesSummary" class="summary"></div>
      <div class="tablewrap">
        <table id="tradesTable">
          <thead><tr>
            <th>#</th><th>方向</th><th>口</th><th>進場</th><th>出場</th>
            <th>進價</th><th>出價</th><th>Ticks</th><th>盈虧 $</th><th>R</th><th>ATM</th><th>出場</th>
          </tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div id="panelDash" class="panel hidden">
      <div id="statCards" class="statcards"></div>
      <div class="dashgrid">
        <div class="dashbox"><div class="dashbox-h">權益曲線 Equity</div><canvas id="equity" width="600" height="180"></canvas></div>
        <div class="dashbox"><div class="dashbox-h">依 ATM 分組</div><div id="atmStats"></div></div>
      </div>
    </div>
  </footer>

</div>
<script src="src/app.js?v=8"></script>
</body>
</html>
