<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NQ Replay Trainer</title>
<link rel="stylesheet" href="src/styles.css" />
<script src="lib/lightweight-charts.standalone.production.js"></script>
</head>
<body>
<div id="app">

  <!-- ===== Top toolbar ===== -->
  <header id="toolbar">
    <div class="grp">
      <span id="symbol">NQ</span>
      <select id="dataSelect" title="資料集"></select>
      <select id="tfSelect" title="時間週期"></select>
      <select id="sessionSelect" title="跳到某個交易日"></select>
    </div>

    <div class="grp center">
      <button id="btnToStart" title="回到此 session 開頭">⏮</button>
      <button id="btnStepBack" title="退一根 (僅空手時)">◀</button>
      <button id="btnPlay" class="play" title="播放 / 暫停 (P)">▶</button>
      <button id="btnStepFwd" title="前進一根 (空白鍵)">▶|</button>
      <select id="speedSelect" title="播放速度">
        <option value="1">1 bar/s</option>
        <option value="2" selected>2 bar/s</option>
        <option value="4">4 bar/s</option>
        <option value="8">8 bar/s</option>
        <option value="20">20 bar/s</option>
      </select>
      <input id="startSlider" type="range" min="0" max="100" value="0" title="拖曳設定起點 (僅空手時)" />
      <button id="btnPickStart" title="點圖設 replay 起點 (空手時)">📍</button>
    </div>

    <div class="grp right">
      <span id="clock" class="mono">--:--</span>
      <span id="clockPrice" class="mono">--</span>
    </div>
  </header>

  <!-- ===== Main: chart + side panel ===== -->
  <main id="main">
    <section id="chartwrap"><div id="chart"></div></section>

    <aside id="side">
      <!-- order entry -->
      <div class="card">
        <div class="card-h">下單 Order</div>
        <div class="row">
          <label>進場別</label>
          <select id="entryType">
            <option value="market">市價 Market</option>
            <option value="limit">限價 Limit</option>
            <option value="stop">停損 Stop</option>
          </select>
        </div>
        <div class="row" id="entryPriceRow" style="display:none">
          <label>進場價</label>
          <input id="entryPrice" type="number" step="0.25" />
        </div>
        <div class="row"><label>ATM 範本</label><select id="atmSelect"></select></div>
        <div class="row"><label title="套用幾組 ATM,每組 = 範本各目標口數總和">口數 ×</label><input id="qty" type="number" min="1" step="1" value="1" /></div>
        <div class="btn-row">
          <button id="btnBuy" class="buy">BUY · Long</button>
          <button id="btnSell" class="sell">SELL · Short</button>
        </div>
        <div class="btn-row">
          <button id="btnFlatten" class="flat">FLATTEN</button>
          <button id="btnReverse" class="rev">REVERSE</button>
        </div>
        <div class="btn-row"><button id="btnCancelEntry" class="flat">取消掛單 Cancel</button></div>
      </div>

      <!-- position -->
      <div class="card">
        <div class="card-h">部位 Position</div>
        <div id="posBox" class="posflat">空手 Flat</div>
        <div id="ordersBox"></div>
      </div>

      <!-- indicators & annotation tools -->
      <div class="card">
        <div class="card-h">指標 / 標註</div>
        <div class="row chk"><label><input id="ripsterToggle" type="checkbox" /> Ripster EMA 雲</label></div>
        <div class="row sub" style="font-size:11px;padding-left:22px">8/9 · 5/12 · 34/50 · 72/89 · 180/200</div>
        <div class="card-h" style="margin-top:10px">標註工具(選一個再點圖)</div>
        <div class="btn-row">
          <button id="annUp" title="放上向上箭頭">↑ 箭頭</button>
          <button id="annDown" title="放上向下箭頭">↓ 箭頭</button>
        </div>
        <div class="btn-row">
          <button id="annLong" class="buy" title="標記做多">做多 L</button>
          <button id="annShort" class="sell" title="標記做空">做空 S</button>
        </div>
        <div class="btn-row"><button id="annClear" class="flat" title="清除所有標註">清除標註</button></div>
        <div class="card-h" style="margin-top:10px">繪圖工具(選一個再點圖)</div>
        <div class="btn-row">
          <button id="drwHL" title="水平線:點一下放在該價位">— 水平線</button>
          <button id="drwTL" title="趨勢線:點兩個端點">／ 趨勢線</button>
        </div>
        <div class="btn-row">
          <button id="drwRay" title="射線:點兩點,往右延伸">↗ 射線</button>
          <button id="drwBox" title="矩形框:點兩個對角">▭ 矩形</button>
        </div>
        <div class="btn-row"><button id="drwClear" class="flat" title="清除所有繪圖">清除繪圖</button></div>
      </div>

      <!-- ATM editor -->
      <details class="card" id="atmEditor">
        <summary class="card-h">ATM 範本編輯 (多目標分批)</summary>
        <div class="row"><label>名稱</label><input id="atmName" type="text" placeholder="My ATM" /></div>
        <div class="row"><label>停損 SL (ticks)</label><input id="atmSL" type="number" min="0" value="10" /></div>
        <div class="row sub2 head"><span>目標</span><span>ticks</span><span>口數</span></div>
        <div class="row sub2"><span>T1</span><input id="atmT1t" type="number" min="0" value="20" /><input id="atmT1q" type="number" min="0" value="1" /></div>
        <div class="row sub2"><span>T2</span><input id="atmT2t" type="number" min="0" value="0" /><input id="atmT2q" type="number" min="0" value="0" /></div>
        <div class="row sub2"><span>T3</span><input id="atmT3t" type="number" min="0" value="0" /><input id="atmT3q" type="number" min="0" value="0" /></div>
        <div class="row chk"><label><input id="atmBEon" type="checkbox" /> 自動保本 Breakeven</label></div>
        <div class="row sub"><label>觸發 / 偏移 (ticks)</label><span><input id="atmBEtrig" type="number" value="12" /> / <input id="atmBEoff" type="number" value="1" /></span></div>
        <div class="row chk"><label><input id="atmTrailon" type="checkbox" /> 移動停損 Trailing</label></div>
        <div class="row sub"><label>啟動 / 距離 (ticks)</label><span><input id="atmTrailTrig" type="number" value="16" /> / <input id="atmTrailDist" type="number" value="8" /></span></div>
        <div class="btn-row">
          <button id="btnAtmSave" class="save">儲存範本</button>
          <button id="btnAtmDel" class="del">刪除</button>
        </div>
      </details>
    </aside>
  </main>

  <!-- ===== Bottom: trades + dashboard ===== -->
  <footer id="bottom">
    <div id="tabs">
      <button id="tabTrades" class="tab active">交易紀錄 Trades</button>
      <button id="tabDash" class="tab">Dashboard</button>
      <span class="spacer"></span>
      <button id="btnExportCsv" class="mini">匯出 CSV</button>
      <button id="btnReset" class="mini danger">清空</button>
    </div>

    <div id="panelTrades" class="panel">
      <div id="tradesSummary" class="summary"></div>
      <div class="tablewrap">
        <table id="tradesTable">
          <thead><tr>
            <th>#</th><th>方向</th><th>口</th><th>進場</th><th>出場</th>
            <th>進價</th><th>出價</th><th>Ticks</th><th>盈虧 $</th><th>R</th><th>ATM</th><th>出場</th>
          </tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div id="panelDash" class="panel hidden">
      <div id="statCards" class="statcards"></div>
      <div class="dashgrid">
        <div class="dashbox"><div class="dashbox-h">權益曲線 Equity</div><canvas id="equity" width="600" height="180"></canvas></div>
        <div class="dashbox"><div class="dashbox-h">依 ATM 分組</div><div id="atmStats"></div></div>
      </div>
    </div>
  </footer>

</div>
<script src="src/app.js"></script>
</body>
</html>
